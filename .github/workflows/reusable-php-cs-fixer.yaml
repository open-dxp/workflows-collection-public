name: PHP-CS-Fixer

on:
    workflow_call:
        inputs:
            head_ref:
                required: true
                type: string
            repository:
                required: true
                type: string
            enable_auto_commit:
                default: true
                required: false
                type: boolean
            config_file:
                default: ".php_cs.dist"
                required: false
                type: string
            use_global_config:
                default: false
                required: false
                type: boolean
            finder_file:
                default: ".php-cs-fixer-finder.dist.php"
                required: false
                type: string
            cs_fixer_mode:
                default: "core" # core or bundle
                required: false
                type: string
            php_version:
                default: "8.3"
                required: false
                type: string
            cs_fixer_version:
                default: "v3.95.2"
                required: false
                type: string
            fork_point:
                default: ""
                required: false
                type: string
        secrets:
            PHP_CS_FIXER_GITHUB_TOKEN:
                required: true

jobs:
    php-cs-fixer:
        permissions:
            contents: write # allow stefanzweifel/git-auto-commit-action to push code in repo
        runs-on: ubuntu-latest
        steps:
            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ inputs.php_version }}

            -   name: Checkout Repository
                uses: actions/checkout@v4
                with:
                    ref: ${{ inputs.head_ref }}
                    repository: ${{ inputs.repository }}
                    token: ${{ secrets.PHP_CS_FIXER_GITHUB_TOKEN }}
                    fetch-depth: ${{ inputs.fork_point != '' && '0' || '1' }}

            -   name: Checkout global config
                uses: actions/checkout@v4
                if: inputs.use_global_config
                with:
                    repository: open-dxp/workflows-collection-public
                    path: .workflows-collection-public
                    ref: 'main'

            -   name: Copy global config
                if: inputs.use_global_config
                run: |
                    cp .workflows-collection-public/php-cs-fixer-configuration/.php-cs-fixer.dist.php .php-cs-fixer-global.php
                    cp .workflows-collection-public/php-cs-fixer-configuration/.php-cs-fixer-bundle.dist.php .php-cs-fixer-bundle-global.php
                    cp .workflows-collection-public/php-cs-fixer-configuration/.php-cs-fixer-ecommerce-bundle.dist.php .php-cs-fixer-ecommerce-bundle-global.php
                    cp .workflows-collection-public/php-cs-fixer-configuration/.php-cs-fixer-gal-digital-bundle.dist.php .php-cs-fixer-gal-digital-bundle-global.php
                    cp .workflows-collection-public/php-cs-fixer-configuration/.php-cs-fixer-rules.dist.php .php-cs-fixer-rules-global.php
                    cp .workflows-collection-public/php-cs-fixer-configuration/.php-cs-fixer-fork-header.dist.php .php-cs-fixer-fork-header-global.php

            -   name: Verify finder file exists
                if: inputs.use_global_config
                run: |
                    if [ ! -f "${{ inputs.finder_file }}" ]; then
                      echo "Error: Finder file '${{ inputs.finder_file }}' not found!"
                      exit 1
                    fi

            -   name: PHP-CS-Fixer
                run: |
                  wget -q https://github.com/FriendsOfPHP/PHP-CS-Fixer/releases/download/${{ inputs.cs_fixer_version }}/php-cs-fixer.phar
                  php php-cs-fixer.phar --version

                  if ${{ inputs.use_global_config }}; then
                    if [ "${{ inputs.cs_fixer_mode }}" = "core" ]; then
                      CONFIG_FILE=".php-cs-fixer-global.php"
                    elif [ "${{ inputs.cs_fixer_mode }}" = "ecommerce_bundle" ]; then
                      CONFIG_FILE=".php-cs-fixer-ecommerce-bundle-global.php"
                    elif [ "${{ inputs.cs_fixer_mode }}" = "gal_digital_bundle" ]; then
                      CONFIG_FILE=".php-cs-fixer-gal-digital-bundle-global.php"
                    else
                      CONFIG_FILE=".php-cs-fixer-bundle-global.php"
                    fi
                  else
                    CONFIG_FILE="${{ inputs.config_file }}"
                  fi

                  if [ -n "${{ inputs.fork_point }}" ]; then
                    FORK_POINT="${{ inputs.fork_point }}" CS_FIXER_MODE=forked php php-cs-fixer.phar fix --config="$CONFIG_FILE" --allow-risky yes
                    FORK_POINT="${{ inputs.fork_point }}" CS_FIXER_MODE=new php php-cs-fixer.phar fix --config="$CONFIG_FILE" --allow-risky yes
                  else
                    php php-cs-fixer.phar fix --config="$CONFIG_FILE" --allow-risky yes
                  fi

            -   name: Clean Up
                run: |
                  rm -f php-cs-fixer.phar
                  rm -rf .workflows-collection-public
                  rm -f .php-cs-fixer-global.php .php-cs-fixer-bundle-global.php .php-cs-fixer-ecommerce-bundle-global.php .php-cs-fixer-gal-digital-bundle-global.php .php-cs-fixer-rules-global.php .php-cs-fixer-fork-header-global.php

            -   uses: stefanzweifel/git-auto-commit-action@v5
                if: inputs.enable_auto_commit
                with:
                    commit_message: Apply php-cs-fixer changes
                    commit_user_name: OpenDXP Bot
                    commit_author: OpenDXP Bot <bot@opendxp.io>
